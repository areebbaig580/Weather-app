<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather-app</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    <div class="section-1">
        <div class="brand-name"><i class="fa-solid fa-cloud brand-icon"></i> Weather guy</div>
        <div class="all">

            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass icon"></i>
                <input type="text" placeholder="Search for places..">
            </div>
            <div class="weather-svg">
                <div class="sun"></div>
                <div class="cloud" style="left:55px; top:30px;">
                    <div class="cloud-puff"></div>
                    <div class="cloud-body"></div>
                </div>
                <div class="rain-drops" style="position:absolute; bottom:5px; left:55%;">
                    <div class="rain-drop"></div>
                    <div class="rain-drop"></div>
                    <div class="rain-drop"></div>
                    <div class="rain-drop"></div>
                </div>
            </div>
          

                <div class="details">
                    <div class="temperature">
                        <div class="main">12</div>
                        <div class="sub">o</div>
                        <div class="sub2">C</div>

                    </div>
                    <div class="date-time">Monday, 16:00</div>
                </div>
                <div class="weather-det">
                    <i class="fa-solid fa-cloud cloud-icon"></i>
                    <div class="weather-det1">Cloudy</div>
                </div>
                <div class="weather-det">
                    <i class="fa-solid fa-cloud-rain cloud-icon"></i>
                    <div class="weather-det1">Rain - 30%</div>
                </div>
                <div class="city">Haldwani</div>
            </div>
    
    </div>
    <div class="section-2">
        <div class="header-nav">
            <div class="toggle-day">
                <div class="toggle-today">Today</div>
                <div class="toggle-week">Week</div>
            </div>
            <div class="toggle-temp">
                <div class="toggle-c">C</div>
                <div class="toggle-f">F</div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
